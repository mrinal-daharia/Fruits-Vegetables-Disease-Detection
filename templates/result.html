<!DOCTYPE html>

<html>

<head>

    <title>Fruits & Vegetables Disease Prediction</title>

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            font-family: Arial, sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #141e30,
                    #243b55
                );

            background-attachment: fixed;

            overflow: hidden;

            padding: 20px;
        }

        .container {

            width: 520px;

            max-width: 100%;

            max-height: 95vh;

            overflow-y: auto;

            scrollbar-width: none;

            padding: 35px;

            border-radius: 28px;

            background: rgba(255,255,255,0.08);

            border: 1px solid rgba(255,255,255,0.18);

            backdrop-filter: blur(20px);

            box-shadow:
                0 8px 40px rgba(0,0,0,0.35);

            text-align: center;

            color: white;
        }

        .container::-webkit-scrollbar {

            display: none;
        }

        h1 {

            margin-bottom: 18px;

            font-size: 32px;

            line-height: 1.3;
        }

        img {

            width: 100%;

            max-width: 320px;

            max-height: 280px;

            object-fit: contain;

            border-radius: 18px;

            margin: 18px 0;

            box-shadow:
                0 4px 20px rgba(0,0,0,0.4);
        }

        .success-box {

            margin-top: 12px;

            padding: 18px;

            border-radius: 16px;

            background: rgba(76,175,80,0.12);

            border: 1px solid rgba(76,175,80,0.35);
        }

        .disease-label {

            font-size: 17px;

            color: rgba(255,255,255,0.7);

            margin-bottom: 10px;
        }

        h2 {

            color: #4caf50;

            font-size: 28px;

            line-height: 1.4;

            word-break: break-word;
        }

        .confidence {

            font-size: 20px;

            margin-top: 14px;

            color: #f5f5f5;
        }

        a {

            display: inline-block;

            margin-top: 22px;

            padding: 14px 30px;

            border-radius: 14px;

            text-decoration: none;

            background:
                linear-gradient(
                    135deg,
                    #4caf50,
                    #ff9800
                );

            color: white;

            font-weight: bold;

            transition: 0.3s;

            box-shadow:
                0 5px 20px rgba(76,175,80,0.3);
        }

        a:hover {

            transform: translateY(-3px);

            box-shadow:
                0 10px 25px rgba(255,152,0,0.4);
        }

        @media(max-width: 600px) {

            body {

                padding: 15px;
            }

            .container {

                width: 100%;

                padding: 26px 18px;
            }

            h1 {

                font-size: 26px;
            }

            h2 {

                font-size: 22px;
            }

            .confidence {

                font-size: 17px;
            }

            img {

                max-height: 220px;
            }

            a {

                width: 100%;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            🥕🍎 Disease Prediction Result
        </h1>

        <img
            src="{{ url_for('static', filename='../uploads/' + image_path) }}"
            alt="Prediction Image"
        >

        <div class="success-box">

            <div class="disease-label">
                Detected Disease
            </div>

            <h2>
                {{ disease }}
            </h2>

            <div class="confidence">
                Confidence : {{ confidence }}%
            </div>

        </div>

        <a href="/">
            Try Another Image
        </a>

    </div>

</body>

</html>
